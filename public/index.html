<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credential Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <button id="hamburger-btn" class="btn-icon" title="Toggle clients">≡</button>
        <h1 id="app-title">Credentials</h1>
        <span id="version-badge"></span>
      </div>
      <div class="header-right">
        <button id="admin-btn" class="btn-admin">Admin</button>
        <button id="export-txt-btn" class="btn-secondary">Print</button>
        <button id="export-btn" class="btn-secondary">Export</button>
        <button id="import-btn" class="btn-secondary admin-only">Import</button>
        <select id="lang-select" class="lang-select">
          <option value="" disabled selected></option>
          <option value="en">English</option>
          <option value="pt-br">Português</option>
        </select>
        <input type="file" id="import-file" accept=".json">
      </div>
    </header>

    <div id="layout">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span id="clients-label">Clients</span>
          <button id="add-client-btn" class="btn-icon admin-only" title="Add client">+</button>
        </div>
        <div id="client-list"></div>
      </aside>

      <div id="sidebar-overlay" class="hidden"></div>

      <main id="main-panel">
        <p class="placeholder">Select a client to view credentials</p>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
